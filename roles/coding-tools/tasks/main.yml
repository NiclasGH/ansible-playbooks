---
- name: Import fedora specific coding tools
  ansible.builtin.include_tasks: os_family/fedora.yml
  when: ansible_facts['os_family']|lower == 'redhat'

  # Dive
- name: Get latest Dive release version
  ansible.builtin.uri:
    url: https://api.github.com/repos/wagoodman/dive/releases/latest
    return_content: true
  register: dive_release

- name: Extract version number
  ansible.builtin.set_fact:
    dive_version: "{{ dive_release.json.tag_name | regex_replace('^v', '') }}"

- name: Check if Dive is already installed
  stat:
    path: "/usr/bin/dive"
  register: dive

- name: Download Dive RPM package
  retries: 3
  delay: 5
  register: result
  until: result is not failed
  when: not (dive.stat.exists is defined and dive.stat.exists)
  ansible.builtin.get_url:
    url: "https://github.com/wagoodman/dive/releases/download/v{{ dive_version }}/dive_{{ dive_version }}_linux_amd64.rpm"
    dest: "/tmp/dive_{{ dive_version }}_linux_amd64.rpm"
    mode: '0644'

- name: Install Dive from RPM
  when: not (dive.stat.exists is defined and dive.stat.exists)
  ansible.builtin.dnf:
    name: "/tmp/dive_{{ dive_version }}_linux_amd64.rpm"
    state: present
    disable_gpg_check: true
  become: true

- name: Clean up downloaded RPM
  when: not (dive.stat.exists is defined and dive.stat.exists)
  ansible.builtin.file:
    path: "/tmp/dive_{{ dive_version }}_linux_amd64.rpm"
    state: absent

  # Node
- name: Check nvm hasn't been installed
  ansible.builtin.stat:
    path: /home/{{ user }}/.nvm
  register: nvm

- name: Download nvm
  retries: 3
  delay: 5
  register: result
  until: result is not failed
  when: not (nvm.stat.isdir is defined and nvm.stat.isdir)
  ansible.builtin.get_url:
    url: https://raw.githubusercontent.com/nvm-sh/nvm/v0.40.3/install.sh
    dest: "/tmp/nvm.sh"
    mode: '0755'

- name: Install nvm
  when: not (nvm.stat.isdir is defined and nvm.stat.isdir)
  ansible.builtin.shell:
    cmd: "/tmp/nvm.sh"

- name: Remove installation script
  ansible.builtin.file:
    state: absent
    path: /tmp/nvm.sh

- name: Install node
  ansible.builtin.shell:
    cmd: "/home/{{ user }}/.nvm/nvm.sh install --lts"

  # Rust
- name: Check rust hasn't been installed
  stat:
    path: "/home/{{ user }}/.cargo/bin/rustc"
  register: rust

- name: Download rust
  retries: 3
  delay: 5
  register: result
  until: result is not failed
  when: not (rust.stat.exists is defined and rust.stat.exists)
  ansible.builtin.get_url:
    url: https://sh.rustup.rs
    dest: "/tmp/rust.sh"
    mode: '0755'

- name: Install rust
  when: not (rust.stat.exists is defined and rust.stat.exists)
  ansible.builtin.shell:
    cmd: "/tmp/rust.sh -y"

- name: Remove installation script
  ansible.builtin.file:
    state: absent
    path: /tmp/rust.sh

- name: Add cargo bin to PATH
  when: not (rust.stat.exists is defined and rust.stat.exists)
  ansible.builtin.blockinfile:
    path: /home/{{ user }}/.zshrc
    append_newline: true
    prepend_newline: true
    block: |
      export PATH=$PATH:$HOME/.cargo/bin

- name: Install cargo-watch
  community.general.cargo:
    name: cargo-watch
