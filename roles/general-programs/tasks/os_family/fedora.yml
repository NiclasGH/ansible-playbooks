---
- name: Install Brave repository
  ansible.builtin.shell:
    cmd: "dnf config-manager addrepo --from-repofile=https://brave-browser-rpm-release.s3.brave.com/brave-browser.repo --overwrite"
  become: true

- name: Install brave
  ansible.builtin.package:
    name: brave-browser
    state: present
  become: true

- name: Import 1password key
  ansible.builtin.rpm_key:
    state: present
    key: https://downloads.1password.com/linux/keys/1password.asc
  become: true

- name: Create 1Password Repo file if not exists
  ansible.builtin.file:
    path: /etc/yum.repos.d/1password.repo
    state: touch
    mode: '0644'
  become: true

- name: 1Password Yum Configuration
  ansible.builtin.blockinfile:
    path: /etc/yum.repos.d/1password.repo
    append_newline: true
    prepend_newline: true
    block: |
      [1password]
      name=1Password Stable Channel
      baseurl=https://downloads.1password.com/linux/rpm/stable/\$basearch
      enabled=1
      gpgcheck=1
      repo_gpgcheck=1
      gpgkey="https://downloads.1password.com/linux/keys/1password.asc"
  become: true

- name: Install 1password
  ansible.builtin.package:
    name: 1password
    state: present
  become: true
